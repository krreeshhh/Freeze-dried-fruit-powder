    // Suppress specific Framer Motion list keys warnings to keep console clean per prompt
    const originalError = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Each child in a list should have a unique "key" prop')) return;
      originalError(...args);
    };

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const fadingOutRef = useRef(false);
      const rafId = useRef(null);

      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      const fadeTo = (target, durationMs = FADE_MS) => {
        if (!videoRef.current) return;
        const video = videoRef.current;

        if (rafId.current !== null) {
          cancelAnimationFrame(rafId.current);
        }

        const startOpacity = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();

        const animate = (time) => {
          const elapsed = time - startTime;
          const progress = Math.min(elapsed / durationMs, 1);
          const currentOpacity = startOpacity + (target - startOpacity) * progress;

          if (video) {
            video.style.opacity = currentOpacity;
          }

          if (progress < 1) {
            rafId.current = requestAnimationFrame(animate);
          }
        };
        rafId.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        video.style.opacity = '0';

        const onLoadedData = () => {
          video.style.opacity = '0';
          video.play().catch(e => console.error("Auto-play failed", e));
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!video) return;
          const timeLeft = video.duration - video.currentTime;
          if (!fadingOutRef.current && timeLeft <= FADE_OUT_LEAD && timeLeft > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            if (!video) return;
            video.currentTime = 0;
            video.play().catch(e => console.error("Play failed", e));
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        if (video.readyState >= 2) {
          onLoadedData();
        }

        return () => {
          if (rafId.current !== null) {
            cancelAnimationFrame(rafId.current);
          }
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ opacity: 0, ...style }}
          autoPlay
          muted
          playsInline
          preload="auto"
        />
      );
    }

    function BlurText({ text, className }) {
      const words = text.split(" ");
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.disconnect();
            }
          },
          { threshold: 0.1 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);

      return (
        <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={isVisible ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] } : {}}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: (i * 100) / 1000 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }
